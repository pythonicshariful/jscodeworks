<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS CodeWorks | Admin Authentication</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body style="background: #030612; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
  <div class="glass-panel" style="width: 400px; padding: 40px;">
    <div style="font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 8px;">
      JS CODEWORKS
    </div>
    <div style="color: var(--secondary); font-family: var(--font-code); font-size: 0.82rem; text-align: center; margin-bottom: 32px;">
      PORTAL AUTHENTICATION
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div style="padding: 10px; background: rgba(239,68,68,0.2); border: 1px solid #EF4444; color: #fff; font-size: 0.85rem; border-radius: 6px; margin-bottom: 20px; text-align: center;">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.darkwolf_login') }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="admin" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
        Authenticate 🔒
      </button>
    </form>
  </div>
</body>
</html>
